%YAML 1.2
---
source: "network"

scheduler:
  worker_thread_number: 4
  stop_on_deadlock: false
  check_recession_period_ms: 0
  worker_thread_priority: 99
  # Pin worker threads to specific cores to avoid contention with DPDK (core 9) and master (core 1)
  # Adjust these core IDs based on your system topology (e.g., NUMA node 0)
  worker_thread_affinity: [2, 3, 4, 5]

advanced_network:
  cfg:
    version: 1
    manager: "dpdk"
    master_core: 1
    debug: false
    log_level: "info"
    
    memory_regions:
    - name: "Data_RX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 65536
      buf_size: 9100 # Jumbo frames
      
    interfaces:
    - name: "rx_port"
      address: "0000:00:00.0" # UPDATE THIS with the actual PCI address of the NIC
      rx:
        flow_isolation: false
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 9
          batch_size: 73
          memory_regions:
            - "Data_RX_GPU"
        flows:
        - name: "flow_0"
          id: 0
          action:
            type: queue
            id: 0
          match:
            udp_dst: 4096 # Example port, update as needed
            
receiver:
  interface_name: "rx_port"
  batch_size: 73
  max_packet_size: 9100
  header_size: 42 # Ethernet + IP + UDP headers (14 + 20 + 8)
  gpu_direct: true
  split_boundary: false
  reorder_kernel: true
  count: 100 # Process 100 frames then stop

processor:
  # Add any parameters for your processor op here
  noop: true

writer:
  filepath: "/home/jrenner/local/lbl/holoscan/sparse_frames_out_net.h5"
  dataset_name: "/processed"
  noop: true

