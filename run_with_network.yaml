%YAML 1.2
---
source: "network"

scheduler:
  worker_thread_number: 4

advanced_network:
  cfg:
    version: 1
    manager: "dpdk"
    master_core: 1
    debug: false
    log_level: "info"
    
    memory_regions:
    - name: "Data_RX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 51200
      buf_size: 1066 # Jumbo frames
      
    interfaces:
    - name: "rx_port"
      address: "0000:00:00.0" # UPDATE THIS with the actual PCI address of the NIC
      rx:
        flow_isolation: false
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 2
          batch_size: 648
          memory_regions:
            - "Data_RX_GPU"
        flows:
        - name: "flow_0"
          id: 0
          action:
            type: queue
            id: 0
          match:
            udp_dst: 50000 # Example port, update as needed
            
receiver:
  interface_name: "rx_port"
  batch_size: 648
  max_packet_size: 1066
  header_size: 42 # Ethernet + IP + UDP headers (14 + 20 + 8)
  gpu_direct: true
  split_boundary: false
  reorder_kernel: true
  count: 100 # Process 100 frames then stop

processor:
  # Add any parameters for your processor op here

writer:
  filepath: "/home/jrenner/local/lbl/holoscan/sparse_frames_out_net.h5"
  dataset_name: "/processed"

resources:
  - &allocator
    type: holoscan::UnboundedAllocator
    name: "pool"
