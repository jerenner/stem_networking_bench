%YAML 1.2
---
source: "network"

scheduler:
  worker_thread_number: 5
  stop_on_deadlock: true
  stop_on_deadlock_timeout: 500
  check_recession_period_ms: 0
  #worker_thread_priority: 99
  # Pin worker threads to specific cores to avoid contention with DPDK (core 9) and master (core 1)
  # Adjust these core IDs based on your system topology (e.g., NUMA node 0)
  #worker_thread_affinity: [2, 3, 4, 5, 6]

advanced_network:
  cfg:
    version: 1
    manager: "dpdk"
    master_core: 3
    debug: false
    log_level: "info"
    
    memory_regions:
    - name: "Header_RX_CPU_0"
      kind: "huge"
      affinity: 0
      num_bufs: 262144
      buf_size: 106 # Ethernet + IP + UDP + 64-byte FPGA custom header
    - name: "Data_RX_GPU_0"
      kind: "device"
      affinity: 0
      num_bufs: 262144
      buf_size: 7680
    - name: "Header_RX_CPU_1"
      kind: "huge"
      affinity: 0
      num_bufs: 262144
      buf_size: 106 # Ethernet + IP + UDP + 64-byte FPGA custom header
    - name: "Data_RX_GPU_1"
      kind: "device"
      affinity: 0
      num_bufs: 262144
      buf_size: 7680
      
    interfaces:
    - name: "rx_port_0"
      address: "0005:03:00.0"
      rx:
        flow_isolation: true
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 9
          batch_size: 16384
          memory_regions:
            - "Header_RX_CPU_0"
            - "Data_RX_GPU_0"
        flows:
        - name: "flow_0"
          id: 0
          action:
            type: queue
            id: 0
          match:
            udp_dst: 23130
    - name: "rx_port_1"
      address: "0005:03:00.1"
      rx:
        flow_isolation: true
        queues:
        - name: "rx_q_1"
          id: 0
          cpu_core: 10
          batch_size: 16384
          memory_regions:
            - "Header_RX_CPU_1"
            - "Data_RX_GPU_1"
        flows:
        - name: "flow_1"
          id: 0
          action:
            type: queue
            id: 0
          match:
            udp_dst: 23130
            
receiver0:
  interface_name: "rx_port_0"
  frames_per_tensor: 128
  max_packet_size: 9100
  header_size: 42
  gpu_direct: true
  split_boundary: true
  reorder_kernel: true
  expected_source_mask: 15 # eth IDs 0-3 active; use 255 for all 8 sources
  batch_close_slack_packets: 512
  incomplete_batch_log_interval: 100
  incomplete_batch_warn_missing_threshold: 1024
  header_batch_packets: 8192
  header_batch_slots: 4
  count: 128000 # Process some number of frames then stop
  # packet_debug: true
  # packet_debug_output_prefix: "/workspace/holohub/build/stem_networking_bench/applications/stem_networking_bench/cpp/recv0_packet_debug"
  # packet_debug_max_batches: 2

receiver1:
  interface_name: "rx_port_1"
  frames_per_tensor: 128
  max_packet_size: 9100
  header_size: 42
  gpu_direct: true
  split_boundary: true
  reorder_kernel: true
  expected_source_mask: 15 # eth IDs 0-3 active; use 255 for all 8 sources
  batch_close_slack_packets: 512
  incomplete_batch_log_interval: 100
  incomplete_batch_warn_missing_threshold: 1024
  header_batch_packets: 8192
  header_batch_slots: 4
  count: 128000 # Process some number of frames then stop
  # packet_debug: true
  # packet_debug_output_prefix: "/workspace/holohub/build/stem_networking_bench/applications/stem_networking_bench/cpp/recv1_packet_debug"
  # packet_debug_max_batches: 2

processor:
  noop: true
  # Add any parameters for your processor op here

writer:
  filepath: "/workspace/holohub/build/stem_networking_bench/applications/stem_networking_bench/cpp/sparse_frames_out_net.h5"
  dataset_name: "/processed"
  noop: true

    #resources:
  #  - &allocator
  #  type: holoscan::UnboundedAllocator
  #  name: "pool"
