%YAML 1.2
---
# Select the HDF5 data source
source: "hdf5"

scheduler:
  worker_thread_number: 3 # One for replayer, one for processor, one for writer

replayer:
  filepath: "/home/jrenner/local/lbl/holoscan/sparse_frames.h5"
  dataset_name: "/frames"
  repeat: false
  start_frame: 0
  frames_per_tensor: 128
  count: 16

processor:
  noop: false
  subtract_dark_frame: false
  dark_frame_path: ""
  dark_frame_dataset: "/processed"
  apply_valid_pixel_mask: false
  valid_pixel_mask_dataset: "/valid_pixel_mask"
  # ImageJ BLR correction: estimate a baseline independently for each frame,
  # detector half, and coarse ZLP/CoreLoss column group from edge rows.
  apply_blr_correction: false
  blr_rows: 30
  blr_zlp_width: 768
  blr_zlp_group_columns: 4
  blr_core_group_columns: 16
  apply_dynamic_half_column_mask: false
  dynamic_mask_median_window_pixels: 31
  dynamic_mask_threshold_ratio: 1.0
  dynamic_mask_threshold_offset: 500.0
  dynamic_mask_excluded_edge_rows: 32
  dynamic_mask_two_sided: true

writer:
  filepath: "/home/jrenner/local/lbl/holoscan/sparse_frames_out.h5"
  dataset_name: "/processed"

resources:
  # Define the actual allocator resource
  - &allocator
    type: holoscan::UnboundedAllocator
    name: "pool"
