%YAML 1.2
---
# Holoscan stem_networking_bench config, SINGLE-receiver mode. Used during
# Phase 1 of the daqiri port to validate the new daqiri-based TX against the
# original Holoscan RX (which is the "known good" STEM frame assembler).
#
# Run on spark-stacked-02 (spark-201a, 169.254.95.47). The peer Spark
# (spark-stacked-01, 169.254.100.253) emits STEM-format UDP at dst port 4096
# from the daqiri stem_daqiri_tx binary -- this Holoscan RX consumes that
# wire format.
#
# The PCIe address below (0000:01:00.0) corresponds to enp1s0f0np0 on
# spark-201a, the direct-link ConnectX-7 NIC.
source: "network"

# Single-NIC mode: cpp/main.cpp will look for a "receiver:" block (not the
# dual-NIC receiver0/receiver1 pair).
num_receivers: 1

scheduler:
  worker_thread_number: 5
  stop_on_deadlock: true
  stop_on_deadlock_timeout: 500
  check_recession_period_ms: 0

advanced_network:
  cfg:
    version: 1
    manager: "dpdk"
    master_core: 8
    debug: false
    log_level: "info"

    memory_regions:
    - name: "Data_RX_GPU"
      kind: "host_pinned"   # GB10/Spark uses host_pinned for GPUDirect
      affinity: 0
      num_bufs: 65536
      buf_size: 9500

    interfaces:
    - name: "rx_port"
      address: "0000:01:00.0"  # enp1s0f0np0 on spark-201a
      rx:
        flow_isolation: true
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 18
          batch_size: 4096
          memory_regions:
            - "Data_RX_GPU"
        flows:
        - name: "flow_0"
          id: 0
          action:
            type: queue
            id: 0
          match:
            udp_dst: 4096      # matches stem_daqiri_tx default dst port

receiver:
  interface_name: "rx_port"
  frames_per_tensor: 128
  max_packet_size: 9100
  header_size: 42            # Eth(14) + IPv4(20) + UDP(8); STEM hdr starts here
  gpu_direct: true
  split_boundary: false
  reorder_kernel: true
  expected_source_mask: 255  # accept all 8 source IDs the daqiri TX emits
  batch_close_slack_packets: 512
  incomplete_batch_log_interval: 100
  incomplete_batch_warn_missing_threshold: 1024
  header_batch_packets: 8192
  header_batch_slots: 8
  high_priority_header_streams: true
  count: 0                   # 0 = run forever; daqiri TX bounds the run by time

processor:
  noop: true
  subtract_dark_frame: false
  dark_frame_path: ""
  dark_frame_dataset: "/processed"
  apply_valid_pixel_mask: false
  valid_pixel_mask_dataset: "/valid_pixel_mask"

writer:
  filepath: "/tmp/stem_phase1_rx_validator.h5"
  dataset_name: "/processed"
  noop: true
