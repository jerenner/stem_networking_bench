# Phase 2+ STEM RX config for stem_daqiri_rx. Run on
#   spark-stacked-02 == spark-201a (169.254.95.47, MAC 4c:bb:47:2e:20:1b)
# The peer TX is:
#   spark-stacked-01 == spark-960b (169.254.100.253, MAC 4c:bb:47:2d:96:0c)
#
# Topology and tuning constants follow daqiri's documented DGX Spark setup
# (third_party/daqiri/examples/daqiri_bench_raw_tx_rx_spark.yaml). Memory
# regions use `kind: host_pinned` per Spark's GPUDirect path on GB10.
#
# To run inside the stem_daqiri:phase2 container on spark-201a:
#
#   docker run --rm -it --privileged --network host \
#       --gpus all --ulimit memlock=-1 --ulimit stack=67108864 \
#       -v /dev/hugepages:/dev/hugepages \
#       stem_daqiri:phase2 \
#       /opt/stem_daqiri/bin/stem_daqiri_rx \
#           /opt/stem_daqiri/bin/configs/stem_rx_spark.yaml --seconds 30
#
%YAML 1.2
---
daqiri:
  cfg:
    version: 1
    stream_type: "raw"
    master_core: 8
    debug: false
    log_level: "info"
    loopback: ""

    memory_regions:
    - name: "Data_RX_GPU"
      kind: "host_pinned"
      affinity: 0
      # 262144 mbufs * 8064 bytes ~= 2 GiB of host-pinned. With
      # frames_per_tensor=16 and ~1024 pkts/frame the worst-case in-flight
      # set is 16*1024 + slack ~= 17K mbufs, so 262144 gives a generous
      # 15x safety margin and absorbs bursty TX without dropping.
      num_bufs: 262144
      buf_size: 8064   # >= packet size 7786

    interfaces:
    - name: "rx_port"
      address: "0002:01:00.0"   # enP2p1s0f0np0 on spark-201a (high-bw ConnectX, no kernel IP)
      rx:
        flow_isolation: true
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 18
          batch_size: 4096
          memory_regions:
            - "Data_RX_GPU"
        flows:
        - name: "flow_0"
          id: 0
          action:
            type: queue
            id: 0
          match:
            udp_src: 4096
            udp_dst: 4096

stem_rx:
  interface_name: "rx_port"
  # 16 frames per emit -> ~16384 packets per batch window, well within the
  # 262144-mbuf pool. The Phase 3 parity sweep can override this back to
  # 128 once we've separated the GPU processor from the poll loop.
  frames_per_tensor: 16
  # Wire layout matches stem_daqiri_tx:
  #   header_size = Eth(14)+IPv4(20)+UDP(8) = 42
  #   payload_size = STEM 7680B row payload
  header_size: 42
  payload_size: 7680
  # Accept all 8 source IDs the TX rotates through.
  expected_source_mask: 255
  batch_close_slack_packets: 512
  total_time_to_recv: 30.0

  # Phase 3 latency capture. Reads epoch_us stamped by the TX into the
  # first packet of every burst, computes now - epoch_us, and prints
  # p50/p90/p99/p999 at end.
  capture_latency: true

  # Phase 3 processor stage. When subtract_dark is true the kernel runs
  # with a constant 0 dark frame and 1.0 mask -- enough GPU work to mirror
  # the Holoscan processor's pipeline depth without needing a real dark
  # frame file.
  subtract_dark: true
  apply_valid_pixel_mask: true

  # Row readout. Set tile_readout: true to mirror upstream/tiling's
  # ZLP/core tile reassembly (see stem_rx_spark_tiled.yaml). The
  # existing TX (which still emits 128 rows/source @ 7680 B) is reused;
  # the RX maps row_offset [0,120) into compact tile slots and the gather
  # kernel fills the missing 256 tile samples by wrapping the payload
  # prefix.
  tile_readout: false
  tile_duplicate_prefix_to_simulate_payload: true
