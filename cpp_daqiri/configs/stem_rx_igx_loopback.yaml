# IGX Orin + RTX 6000 Ada HW-loopback RX config for stem_daqiri_rx.
# Cable TX 0005:03:00.0 directly to RX 0005:03:00.1.
#
%YAML 1.2
---
source: "network"

daqiri:
  cfg:
    version: 1
    stream_type: "raw"
    master_core: 8
    debug: false
    log_level: "info"
    loopback: ""

    memory_regions:
    - name: "Data_RX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 262144
      buf_size: 8064   # >= packet size 7786

    interfaces:
    - name: "rx_port"
      address: "0005:03:00.1"
      rx:
        flow_isolation: true
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 9
          batch_size: 4096
          timeout_us: 1000
          memory_regions:
            - "Data_RX_GPU"
        flows:
        - name: "flow_0"
          id: 0
          action:
            type: queue
            id: 0
          match:
            udp_src: 4096
            udp_dst: 4096
            ipv4_len: 7772   # 7786-byte wire packet minus 14-byte Ethernet header

stem_rx:
  interface_name: "rx_port"
  # IGX loopback smoke setting. Use a 128-frame parity config when comparing
  # reduced /processed output against Holoscan.
  frames_per_tensor: 16
  header_size: 42
  payload_size: 7680
  expected_source_mask: 255
  batch_close_slack_packets: 512
  total_time_to_recv: 30.0
  capture_latency: true
  gpu_header_extract: true
  # Tile readout is the only reassembly mode; the test TX still emits 128
  # row packets/source @ 7680 B so leave tile_duplicate_prefix_to_simulate_payload
  # true. Set to false if the source emits full 4096-sample tile payloads.
  tile_duplicate_prefix_to_simulate_payload: true

processor:
  noop: true
  subtract_dark_frame: false
  dark_frame_path: ""
  dark_frame_dataset: "/processed"
  apply_valid_pixel_mask: false
  valid_pixel_mask_dataset: "/valid_pixel_mask"
  apply_dynamic_half_column_mask: false
  dynamic_mask_median_window_pixels: 31
  dynamic_mask_threshold_ratio: 1.0
  dynamic_mask_threshold_offset: 500.0

writer:
  filepath: "/tmp/stem_rx_igx_loopback.h5"
  dataset_name: "/processed"
  noop: true
  num_concurrent: 3
