# Phase 2+ STEM RX config -- tile readout variant of stem_rx_spark.yaml.
# Mirrors upstream/tiling cpp/run_with_network_fpga.yaml flipping
# `tile_readout: true` on the Holoscan receivers, so the daqiri RX can be
# A/B-compared against Holoscan on the same wire format.
#
# The TX side is unchanged: stem_daqiri_tx still emits 128 row packets per
# source per frame at 7680 B payload. With tile_readout=true the RX:
#   - rejects row_offset >= 120 (8 of 128 rows per source) and counts them
#     as `tile dropped pkts`,
#   - maps the kept 120 row offsets into a compact tile_index per source
#     (8 sources x 120 = 960 tiles/frame),
#   - scatters payloads into the configured ZLP (32x128) and core
#     (128x32) tile geometry,
#   - and, with tile_duplicate_prefix_to_simulate_payload=true, fills the
#     missing 256 samples of each 4096-sample tile by wrapping the front
#     of the 3840-sample row payload.
#
# Run on spark-stacked-02 (spark-201a, 169.254.95.47):
#
#   docker run --rm -it --privileged --network host \
#       --gpus all --ulimit memlock=-1 --ulimit stack=67108864 \
#       -v /dev/hugepages:/dev/hugepages \
#       stem_daqiri:phase2 \
#       /opt/stem_daqiri/bin/stem_daqiri_rx \
#           /opt/stem_daqiri/bin/configs/stem_rx_spark_tiled.yaml \
#           --seconds 30
#
%YAML 1.2
---
daqiri:
  cfg:
    version: 1
    stream_type: "raw"
    master_core: 8
    debug: false
    log_level: "info"
    loopback: ""

    memory_regions:
    - name: "Data_RX_GPU"
      kind: "host_pinned"
      affinity: 0
      num_bufs: 262144
      buf_size: 8064

    interfaces:
    - name: "rx_port"
      address: "0002:01:00.0"
      rx:
        flow_isolation: true
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 18
          batch_size: 4096
          memory_regions:
            - "Data_RX_GPU"
        flows:
        - name: "flow_0"
          id: 0
          action:
            type: queue
            id: 0
          match:
            udp_src: 4096
            udp_dst: 4096

stem_rx:
  interface_name: "rx_port"
  frames_per_tensor: 16
  header_size: 42
  payload_size: 7680
  expected_source_mask: 255
  batch_close_slack_packets: 512
  total_time_to_recv: 30.0

  capture_latency: true

  subtract_dark: true
  apply_valid_pixel_mask: true

  # Tile readout. See cpp/kernels.cu::tile_geometry on upstream/tiling.
  tile_readout: true
  tile_duplicate_prefix_to_simulate_payload: true
