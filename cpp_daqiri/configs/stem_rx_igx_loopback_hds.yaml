# IGX Orin + RTX 6000 Ada HW-loopback RX config with daqiri HDS enabled.
# Cable TX 0005:03:00.0 directly to RX 0005:03:00.1.
#
# Header bytes land in host-pinned memory and payload bytes land in device
# memory. The runtime checks the observed split is exactly 106/7680 before
# assembling frames.
#
%YAML 1.2
---
source: "network"

daqiri:
  cfg:
    version: 1
    stream_type: "raw"
    master_core: 8
    debug: false
    log_level: "info"
    loopback: ""

    memory_regions:
    - name: "Data_RX_HDR"
      kind: "host_pinned"
      affinity: 0
      num_bufs: 262144
      buf_size: 106    # Eth+IPv4+UDP(42) + STEM header(64)
    - name: "Data_RX_PAYLOAD"
      kind: "device"
      affinity: 0
      num_bufs: 262144
      buf_size: 7680   # payload-only; daqiri adds mbuf headroom

    interfaces:
    - name: "rx_port"
      address: "0005:03:00.1"
      rx:
        flow_isolation: true
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 9
          batch_size: 4096
          timeout_us: 1000
          memory_regions:
            - "Data_RX_HDR"
            - "Data_RX_PAYLOAD"
        flows:
        - name: "flow_0"
          id: 0
          action:
            type: queue
            id: 0
          match:
            udp_src: 4096
            udp_dst: 4096
            # Flow match only; the RX queue's chained memory regions drive HDS.
            ipv4_len: 7772

stem_rx:
  interface_name: "rx_port"
  # IGX HDS loopback smoke setting. Use a 128-frame parity config when
  # comparing reduced /processed output against Holoscan.
  frames_per_tensor: 16
  header_size: 42
  payload_size: 7680
  expected_source_mask: 255
  batch_close_slack_packets: 512
  total_time_to_recv: 30.0
  capture_latency: true
  gpu_header_extract: false
  hds: true
  # The loopback TX emits 7680-byte test payloads. Do not set this false
  # until the peer emits native 8192-byte tile payloads and the RX memory
  # region sizes/MTU are updated accordingly.
  tile_duplicate_prefix_to_simulate_payload: true

processor:
  noop: true
  subtract_dark_frame: false
  dark_frame_path: ""
  dark_frame_dataset: "/processed"
  apply_valid_pixel_mask: false
  valid_pixel_mask_dataset: "/valid_pixel_mask"
  apply_blr_correction: false
  blr_rows: 30
  blr_zlp_width: 768
  blr_zlp_group_columns: 4
  blr_core_group_columns: 16
  apply_dynamic_half_column_mask: false
  dynamic_mask_median_window_pixels: 31
  dynamic_mask_threshold_ratio: 1.0
  dynamic_mask_threshold_offset: 500.0
  dynamic_mask_excluded_edge_rows: 32
  dynamic_mask_two_sided: true

writer:
  filepath: "/tmp/stem_rx_igx_loopback_hds.h5"
  dataset_name: "/processed"
  noop: true
  num_concurrent: 3
