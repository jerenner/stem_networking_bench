%YAML 1.2
---
# Select the HDF5 data source
source: "hdf5"

scheduler:
  worker_thread_number: 3 # One for replayer, one for processor, one for writer

replayer:
  filepath: "/home/daquser/jrenner/sparse_frames.h5"
  dataset_name: "/frames"
  repeat: false
  count: 16

processor:
  # Add any parameters for your processor op here

writer:
  filepath: "/home/daquser/jrenner/sparse_frames_out.h5"
  dataset_name: "/processed"

resources:
  # Define the actual allocator resource
  - &allocator
    type: holoscan::UnboundedAllocator
    name: "pool"
